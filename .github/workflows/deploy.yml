name: CI & Deploy

on:
  push:
    branches:
      - perf/post-load-tests

env:
  REMOTE_DIR: ${{ secrets.REMOTE_APP_DIR }}
  NETWORK: nextdoor-net

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        working-directory: backend/nextdoor
        run: chmod +x ./gradlew

      - name: Build with Gradle
        working-directory: backend/nextdoor
        run: ./gradlew clean bootJar -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: backend/nextdoor/build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (to get deploy.sh)
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Debug network
        run: |
          echo "===== PING 테스트 ====="
          ping -c 4 ${{ secrets.SSH_HOST }} \
            || echo ">>> PING 응답 없음 (ICMP 차단 혹은 네트워크 불가)"

          echo "===== SSH 포트 연결 테스트 ====="
          nc -zv ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }} \
            && echo ">>> SSH 포트 열림" \
            || echo ">>> SSH 포트 닫힘 또는 접근 불가"

      - name: Copy JAR & deploy.sh to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:      ${{ secrets.SSH_HOST }}
          port:      ${{ secrets.SSH_PORT }}
          username:  ${{ secrets.SSH_USER }}
          key:       ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/nextdoor/build/libs/*.jar,deploy.sh"
          target:    ${{ env.REMOTE_DIR }}

      - name: SSH & run deploy.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          port:     ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.REMOTE_DIR }}

            # 1) Create secret config
            mkdir -p config
            echo "${{ secrets.APPLICATION_SECRET }}" > config/application-secret.yaml

            # 2) Run deploy script
            chmod +x deploy.sh
            ./deploy.sh
