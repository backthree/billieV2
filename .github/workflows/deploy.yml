name: CI & Deploy

on:
  push:
    branches:
      - perf/post-load-tests

env:
  REMOTE_DIR: ${{ secrets.REMOTE_APP_DIR }}
  NETWORK: nextdoor-net

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        working-directory: backend/nextdoor
        run: chmod +x ./gradlew

      - name: Build with Gradle
        working-directory: backend/nextdoor
        run: ./gradlew clean bootJar -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: backend/nextdoor/build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code # deploy.sh 파일을 가져오기 위해 필요
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Copy JAR and script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.jar, deploy.sh" # JAR 파일과 deploy.sh 스크립트를 함께 복사
          target: "${{ env.REMOTE_DIR }}"

      - name: Create secret and execute script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.REMOTE_DIR }}

            # 1. 비밀 설정 파일 생성 (이 부분만 yml에 남김)
            mkdir -p config
            echo "${{ secrets.APPLICATION_SECRET }}" > config/application-secret.yaml
            
            # 2. 복사된 스크립트에 실행 권한 부여
            chmod +x deploy.sh

            # 3. 배포 스크립트 실행
            ./deploy.sh