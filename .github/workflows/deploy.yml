name: CI & Deploy with Docker Compose

on:
  push:
    branches:
      - perf/post-load-tests

env:
  REMOTE_DIR: ${{ secrets.REMOTE_APP_DIR }}
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nextdoor-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        working-directory: backend/nextdoor
        run: chmod +x ./gradlew

      - name: Build with Gradle
        working-directory: backend/nextdoor
        run: ./gradlew clean bootJar --no-daemon

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/nextdoor
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml, init-cassandra.sh"
          target: "${{ env.REMOTE_DIR }}"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.REMOTE_DIR }}

            # 1. docker-compose (V2) 설치 확인 및 자동 설치
            if ! docker compose version &> /dev/null; then
                echo "docker-compose-plugin (for 'docker compose') could not be found, installing it now."
                sudo apt-get update -y
                sudo apt-get install -y docker-compose-plugin
            fi

            # 2. 비밀 설정 파일 생성
            mkdir -p config
            echo '${{ secrets.APPLICATION_SECRET }}' > config/application-secret.yaml

            # 3. Docker Compose가 사용할 환경변수 설정
            export DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}

            # 4. 기존 서비스 중지 및 제거 (수정된 부분)
            echo "Stopping and removing old containers..."
            docker compose down --remove-orphans

            # 5. 최신 이미지 받고, 모든 서비스 실행
            echo "Pulling latest images..."
            docker compose pull

            echo "Starting all services..."
            docker compose up -d