name: CI & Deploy

on:
  push:
    branches:
      - perf/post-load-tests

env:
  REMOTE_DIR: ${{ secrets.REMOTE_APP_DIR }}
  NETWORK: nextdoor-net

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        working-directory: backend/nextdoor
        run: chmod +x ./gradlew

      - name: Build with Gradle
        working-directory: backend/nextdoor
        run: ./gradlew clean bootJar -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: backend/nextdoor/build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.jar"
          target: "${{ env.REMOTE_DIR }}/"

      - name: Create secret and execute remote script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.REMOTE_DIR }}

            # 1. 비밀 설정 파일 생성
            mkdir -p config
            echo "${{ secrets.APPLICATION_SECRET }}" > config/application-secret.yaml
            
            # 2. 외부 Gist에서 최신 스크립트 다운로드
            curl -sL "https://gist.githubusercontent.com/Choijake/6a13adca9840915a76a29eafecdf00e1/raw/5bc4837a30931ce3d385f81c26384f10c058ebb3/deploy.sh" -o deploy.sh

            # 3. 실행 권한 부여
            chmod +x deploy.sh
            
            # 4. 배포 스크립트를 실행하고, 모든 출력을 deploy_log.txt에 저장
            #    스크립트가 중간에 실패해도 로그를 확인하기 위해 || true 를 추가
            ./deploy.sh > deploy_log.txt 2>&1 || true
            
            # 5. 서버에 기록된 진짜 로그를 출력
            echo "--- RAW SERVER LOG START ---"
            cat deploy_log.txt
            echo "--- RAW SERVER LOG END ---"

            # 6. 배포 스크립트가 성공적으로 끝났는지 수동으로 확인
            #    deploy_log.txt 마지막 줄에 "Deployed at"이 있는지 확인
            if ! grep -q "Deployed at" deploy_log.txt; then
              echo "Deployment script failed. Check the raw log above."
              exit 1
            fi