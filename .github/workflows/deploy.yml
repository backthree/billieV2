name: CI & Deploy

on:
  push:
    branches:
      - perf/post-load-tests

env:
  REMOTE_DIR: ${{ secrets.REMOTE_APP_DIR }}
  NETWORK: nextdoor-net
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nextdoor-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        working-directory: backend/nextdoor
        run: chmod +x ./gradlew

      - name: Build with Gradle
        working-directory: backend/nextdoor
        run: ./gradlew clean bootJar --no-daemon

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/nextdoor # Dockerfile이 있는 위치
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.REMOTE_DIR }}

            # 외부 Gist에서 최신 배포 스크립트 다운로드
            curl -sL "https://gist.githubusercontent.com/Choijake/6a13adca9840915a76a29eafecdf00e1/raw/36c9e0a1f12152b688e10c3fa017aac1739fe225/deploy.sh" -o deploy.sh

            # 실행 권한 부여
            chmod +x deploy.sh
            
            # Docker 이미지 이름과 비밀 설정을 환경변수로 전달하며 실행
            DOCKER_IMAGE=${{ env.DOCKER_IMAGE }} APPLICATION_SECRET='${{ secrets.APPLICATION_SECRET }}' ./deploy.sh
