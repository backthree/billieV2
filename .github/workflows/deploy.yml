name: CI & Deploy

on:
  push:
    branches:
      - perf/post-load-tests

env:
  REMOTE_DIR: ${{ secrets.REMOTE_APP_DIR }}
  NETWORK: nextdoor-net

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        working-directory: backend/nextdoor
        run: chmod +x ./gradlew

      - name: Build with Gradle
        working-directory: backend/nextdoor
        run: ./gradlew clean bootJar -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: backend/nextdoor/build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.jar"
          target: "${{ env.REMOTE_DIR }}/app.jar"

      - name: Remote deploy (start services & app)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            ES_IMAGE_B64="ZG9ja2VyLmVsYXN0aWMuY28vZWxhc3RpY3NlYXJjaC9lbGFzdGljc2VhcmNoOjguNi4z"
            CASSANDRA_IMAGE_B64="Y2Fzc2FuZHJhOjQuMA=="
            RABBITMQ_IMAGE_B64="cmFiYml0bXE6My1tYW5hZ2VtZW50"
            REDIS_IMAGE_B64="cmVkaXM6Ni4y"

            cd ${{ env.REMOTE_DIR }}

            # 1) Docker 네트워크 확인/생성
            docker network inspect ${{ env.NETWORK }} >/dev/null 2>&1 \
              || docker network create ${{ env.NETWORK }}

            # 2) application-secret.yaml 생성
            mkdir -p config
            echo "${{ secrets.APPLICATION_SECRET }}" > config/application-secret.yaml

            # 3) 의존 서비스 컨테이너 재시작
            for svc in cassandra elasticsearch rabbitmq redis; do
              docker rm -f nextdoor-$svc || true
            done

            # Cassandra (실행 시점에 Base64 디코딩)
            docker run -d --name nextdoor-cassandra \
              --network ${{ env.NETWORK }} \
              -p 9042:9042 \
              $(echo "$CASSANDRA_IMAGE_B64" | base64 -d)

            # Elasticsearch (실행 시점에 Base64 디코딩)
            docker run -d --name nextdoor-elasticsearch \
              --network ${{ env.NETWORK }} \
              -e discovery.type=single-node \
              -e xpack.security.enabled=false \
              --ulimit memlock=-1:-1 --memory=1g \
              -p 9200:9200 \
              $(echo "$ES_IMAGE_B64" | base64 -d)

            # RabbitMQ (실행 시점에 Base64 디코딩)
            docker run -d --name nextdoor-rabbitmq \
              --network ${{ env.NETWORK }} \
              -e RABBITMQ_DEFAULT_USER=guest \
              -e RABBITMQ_DEFAULT_PASS=guest \
              -p 5672:5672 -p 15672:15672 \
              $(echo "$RABBITMQ_IMAGE_B64" | base64 -d)

            # Redis (실행 시점에 Base64 디코딩)
            docker run -d --name nextdoor-redis \
              --network ${{ env.NETWORK }} \
              -p 6379:6379 \
              $(echo "$REDIS_IMAGE_B64" | base64 -d)

            echo "Waiting for services to be ready..."
            sleep 30

            # 4) Cassandra 초기 스키마 적용
            cat << 'EOF' > schema.cql
            CREATE KEYSPACE IF NOT EXISTS nextdoor_chat
              WITH replication = {'class':'SimpleStrategy','replication_factor':1};
            USE nextdoor_chat;
            CREATE TABLE IF NOT EXISTS conversation (
              conversation_id uuid PRIMARY KEY,
              participant_ids list<bigint>,
              created_at timestamp
            );
            CREATE TABLE IF NOT EXISTS chat_messages (
              conversation_id uuid,
              sent_at timestamp,
              message_id uuid,
              sender_id bigint,
              content text,
              is_read boolean,
              PRIMARY KEY ((conversation_id), sent_at, message_id)
            ) WITH CLUSTERING ORDER BY (sent_at DESC);
            CREATE TABLE IF NOT EXISTS unread_counters (
              conversation_id uuid,
              user_id bigint,
              unread_count counter,
              PRIMARY KEY ((conversation_id), user_id)
            );
            EOF

            timeout=60
            while ! docker exec nextdoor-cassandra cqlsh -e "DESCRIBE KEYSPACES;" \
                  >/dev/null 2>&1; do
              timeout=$((timeout-5))
              if [ $timeout -le 0 ]; then
                echo "Cassandra did not start in time."
                exit 1
              fi
              echo "Waiting for Cassandra..."
              sleep 5
            done
            docker exec -i nextdoor-cassandra cqlsh < schema.cql
            rm schema.cql

            # 5) 기존 애플리케이션 종료
            pkill -f 'java.*app.jar' || true

            # 6) 새 애플리케이션 기동
            nohup java -jar \
              -Dspring.profiles.active=prod,secret \
              -Dspring.config.additional-location=./config/ \
              app.jar > app.log 2>&1 &

            echo "Deployed at $(date)"