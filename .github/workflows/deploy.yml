name: CI & Deploy

on:
  push:
    branches:
      - perf/post-load-tests

env:
  REMOTE_DIR: ${{ secrets.REMOTE_APP_DIR }}
  NETWORK: nextdoor-net

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        working-directory: backend/nextdoor
        run: chmod +x ./gradlew

      - name: Build with Gradle
        working-directory: backend/nextdoor
        run: ./gradlew clean bootJar -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: backend/nextdoor/build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (to get deploy.sh)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Verify files
        run: |
          ls -la .
          echo "→ Found JAR(s):" && ls -1 *.jar
          echo "→ deploy.sh present:" && [ -f deploy.sh ]

      - name: Debug network
        run: |
          ping -c 2 ${{ secrets.SSH_HOST }} || echo "PING failed"
          nc -zv ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }} \
            && echo "SSH ok" || echo "SSH failed"

      - name: Copy JAR & deploy.sh to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          port:     ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          source:   "*.jar,deploy.sh"
          target:   ${{ env.REMOTE_DIR }}

      - name: SSH & run deploy.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          port:     ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.REMOTE_DIR }}
            mkdir -p config
            echo "${{ secrets.APPLICATION_SECRET }}" > config/application-secret.yaml
            chmod +x deploy.sh
            ./deploy.sh