name: CI & Deploy

on:
  push:
    branches:
      - perf/post-load-tests

env:
  REMOTE_DIR: ${{ secrets.REMOTE_APP_DIR }}
  NETWORK: nextdoor-net
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nextdoor-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        working-directory: backend/nextdoor
        run: chmod +x ./gradlew

      - name: Build with Gradle
        working-directory: backend/nextdoor
        run: ./gradlew clean bootJar --no-daemon

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend/nextdoor
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          port:     ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.REMOTE_DIR }}

            # 최신 배포 스크립트 가져오기
            curl -sL https://gist.githubusercontent.com/Choijake/6a13adca9840915a76a29eafecdf00e1/raw/6accb9976fb99ffac541bd3ec79719229c6bfee5/deploy.sh -o deploy.sh

            chmod +x deploy.sh

            # DOCKER_IMAGE 와 APPLICATION_SECRET 을 환경변수로 전달
            DOCKER_IMAGE=${{ env.DOCKER_IMAGE }} APPLICATION_SECRET='${{ secrets.APPLICATION_SECRET }}' ./deploy.sh
