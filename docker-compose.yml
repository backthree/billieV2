version: '3.8'

services:
  app:
    image: ${DOCKER_IMAGE}:latest
    container_name: nextdoor-app
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod,secret
      - SPRING_CONFIG_ADDITIONAL-LOCATION=file:/app/config/application-secret.yaml
    volumes:
      - ./config:/app/config:ro
    networks:
      - nextdoor-net
    depends_on:
      mysql:
        condition: service_healthy
      nextdoor-elasticsearch:
        condition: service_healthy
      nextdoor-cassandra:
        condition: service_healthy
      nextdoor-rabbitmq:
        condition: service_healthy
      nextdoor-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 120s

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=ssafy12p2e205
      - MYSQL_DATABASE=nextdoor
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nextdoor-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  nextdoor-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    container_name: nextdoor-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - nextdoor-net
    command:
      - sh
      - -c
      - |
        echo "Installing analysis-nori plugin…" &&
        bin/elasticsearch-plugin install analysis-nori --batch &&
        exec /usr/local/bin/docker-entrypoint.sh "$@"
    healthcheck:
      test: [ "CMD-SHELL", "curl -s --fail http://localhost:9200/_cluster/health?wait_for_status=yellow" ]
      interval: 20s
      timeout: 10s
      retries: 5

  nextdoor-cassandra:
    image: cassandra:4.0
    container_name: nextdoor-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./init-cassandra.sh:/docker-entrypoint-initdb.d/init-cassandra.sh:ro
    networks:
      - nextdoor-net
    command:
      - bash
      - -c
      - |
        # 1) Cassandra 백그라운드 실행
        cassandra -f -R &

        # 2) CQLSH 접속 준비될 때까지 대기
        until cqlsh localhost 9042 -e "describe keyspaces" >/dev/null 2>&1; do
          echo "Waiting for Cassandra to be ready..."
          sleep 5
        done

        # 3) init 스크립트 실행
        bash /docker-entrypoint-initdb.d/init-cassandra.sh

        # 4) 포그라운드 프로세스 유지
        wait
    healthcheck:
      test: [ "CMD-SHELL", "cqlsh localhost 9042 -e 'describe keyspaces'" ]
      start_period: 120s
      interval: 30s
      timeout: 10s
      retries: 10

  nextdoor-rabbitmq:
    image: rabbitmq:3-management
    container_name: nextdoor-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=ssafy
      - RABBITMQ_DEFAULT_PASS=ssafy12p2e205
    networks:
      - nextdoor-net
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_running -q"]
      interval: 20s
      timeout: 10s
      retries: 5

  nextdoor-redis:
    image: redis:6.2
    container_name: nextdoor-redis
    ports:
      - "6379:6379"
    networks:
      - nextdoor-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  nextdoor-net:
    driver: bridge

volumes:
  mysql_data:
  cassandra_data:
  rabbitmq_data:
  redis_data:
  elasticsearch_data: