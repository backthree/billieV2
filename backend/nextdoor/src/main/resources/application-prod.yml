spring:
  application:
    name: nextdoor
  transaction:
    default-timeout: 100
  datasource:
    hikari:
      maximum-pool-size: 10
      idle-timeout: 600000
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 1000
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: localhost
      port: 6379
      ssl:
        enabled: true
    mongodb:
      uri: mongodb://localhost:27017/nextdoor_chat
  elasticsearch:
    uris: http://localhost:9200
  security:
    oauth2:
      client:
        registration:
          kakao:
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
              - gender
              - birthday
            client-name: Kakao
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

sqs:
  queue:
    create-delete: billie-post-create-delete-queue
    update: billie-post-update-queue
    reindex: billie-reindex-queue
custom:
  google:
    ai:
      gemini:
        model:
          flash: gemini-2.5-flash-preview-05-20
          pro: gemini-2.5-pro-preview-05-06
          flashHigh: gemini-2.5-flash-preview-05-20
        location: us-central1
  damage-analyzer-prompt-location: damageAnalyzerPrompt.txt
  summarizer-prompt-location: summarizerPrompt.txt
  pair-damage-comparator-prompt-location: pairDamageComparatorPrompt.txt
  product-analyzer-prompt-location: productAnalyzerPrompt.txt
  product-condition-analyzer-prompt-location: productConditionAnalyzerPrompt.txt

cloud:
  aws:
    region:
      static: ap-northeast-2
    stack:
      auto: false
    s3:
      bucket: oneders

logging:
  level:
    root: ERROR
    com.nextdoor.nextdoor.domain.post.search: WARN

---

spring:
  config:
    activate:
      on-profile: "api"

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: '*'
  prometheus:
    metrics:
      export:
        enabled: true

---

spring:
  config:
    activate:
      on-profile: "worker"

  main:
    web-application-type: none
