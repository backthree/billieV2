spring:
  application:
    name: nextdoor
  transaction:
    default-timeout: 100
  datasource:
    hikari:
      maximum-pool-size: 30
      idle-timeout: 600000
      register-mbeans: true
      metric-registry: hikariMetricRegistry
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 1000
        dialect: org.hibernate.dialect.MySQLDialect
        generate_statistics: true
    defer-datasource-initialization: true
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: localhost
      port: 6379
      ssl:
        enabled: true
      lettuce:
        pool:
          enabled: true
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 5000ms
    mongodb:
      uri: mongodb://localhost:27017/nextdoor_chat
  elasticsearch:
    uris: http://localhost:9200
  security:
    oauth2:
      client:
        registration:
          kakao:
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/code/{registrationId}"
            scope: [profile_nickname, profile_image, account_email, gender, birthday]
            client-name: Kakao
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

sqs:
  queue:
    reindex: billie-indexer-queue
    upsert: posts-upsert.fifo
    delete: posts-delete

custom:
  google:
    ai:
      gemini:
        model:
          flash: gemini-2.5-flash-preview-05-20
          pro: gemini-2.5-pro-preview-05-06
          flashHigh: gemini-2.5-flash-preview-05-20
        location: us-central1
  damage-analyzer-prompt-location: damageAnalyzerPrompt.txt
  summarizer-prompt-location: summarizerPrompt.txt
  pair-damage-comparator-prompt-location: pairDamageComparatorPrompt.txt
  product-analyzer-prompt-location: productAnalyzerPrompt.txt
  product-condition-analyzer-prompt-location: productConditionAnalyzerPrompt.txt

cloud:
  aws:
    region:
      static: ap-northeast-2
    stack:
      auto: false
    s3:
      bucket: oneders

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,threaddump,heapdump
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
  metrics:
    tags:
      app: billie
      svc: api
      env: prod
    distribution:
      percentiles-histogram:
        http.server.requests: true
        tomcat.threads.busy: true
        tomcat.threads.utilization: true
      sla:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s,5s
        tomcat.threads.utilization: 50,70,80,90
    enable:
      hikaricp: true
      tomcat: true
      jvm: true
      process: true
      system: true
      redis: true
  prometheus:
    metrics:
      export:
        enabled: true

---

spring:
  config:
    activate:
      on-profile: "api"
  mvc:
    async:
      request-timeout: 30s
server:
  port: 8081
  tomcat:
    connection-timeout: 30s
    threads:
      max: 300
      min-spare: 20
    accept-count: 200
    max-connections: 8192
    accesslog:
      enabled: false

logging:
  level:
    root: DEBUG
    org.apache.tomcat.util.threads: INFO
    org.apache.coyote: INFO
    com.zaxxer.hikari: DEBUG
    com.nextdoor.nextdoor.config.monitoring: INFO

management:
  metrics:
    enable:
      tomcat: true
      hikaricp: true
    jvm:
      threads:
        enabled: true
      memory:
        enabled: true
      gc:
        enabled: true

---

spring:
  config:
    activate:
      on-profile: "worker"
  main:
    web-application-type: none
  task:
    scheduling:
      pool:
        size: 3
        thread-name-prefix: "scheduling-"
        await-termination: true
        await-termination-seconds: 20
    execution:
      pool:
        core-size: 5
        max-size: 15
        queue-capacity: 100
        thread-name-prefix: "async-"
        keep-alive: 60s

logging:
  level:
    root: ERROR
    com.nextdoor.nextdoor.domain.post.search: WARN
    org.springframework.scheduling: WARN
    org.springframework.core.task: WARN

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      enabled: true
    metrics:
      enabled: true
  metrics:
    tags:
      app: billie
      svc: worker
      env: prod
    enable:
      jvm: true
      process: true
      system: true